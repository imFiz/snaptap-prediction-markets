    <script>
      // Workaround for @solana/web3.js cross-fetch polyfill issue in some environments
      if (typeof window !== 'undefined') {
        const originalFetch = window.fetch;
        Object.defineProperty(window, 'fetch', {
          configurable: true,
          enumerable: true,
          get() {
            return originalFetch;
          },
          set(newFetch) {
            // Ignore attempts to overwrite fetch
          }
        });
        
        // Polyfill global for Solana web3.js
        window.global = window;
      }
    </script>
